<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Reparando Hábitos…</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f7f7f8;
      color: #1a1a1f;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 360px;
      text-align: center;
      background: #fff;
      border: 1px solid #ececef;
      border-radius: 28px;
      padding: 36px 28px;
      box-shadow: 0 20px 40px -15px rgba(0,0,0,0.08);
    }
    .spinner {
      width: 44px; height: 44px;
      margin: 0 auto 20px;
      border: 4px solid #e6e6ea;
      border-top-color: #0066FF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 20px; margin: 0 0 8px; letter-spacing: -0.02em; }
    p { font-size: 14px; color: #5b5b66; margin: 0; line-height: 1.5; }
    .ok { color: #10B981; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner" id="spin"></div>
    <h1 id="title">Reparando la app…</h1>
    <p id="status">Limpiando caché y service worker.</p>
  </div>
  <script>
    (async function () {
      var status = document.getElementById('status');
      var title = document.getElementById('title');
      try {
        if ('serviceWorker' in navigator) {
          var regs = await navigator.serviceWorker.getRegistrations();
          for (var i = 0; i < regs.length; i++) { await regs[i].unregister(); }
        }
        if (window.caches && caches.keys) {
          var keys = await caches.keys();
          await Promise.all(keys.map(function (k) { return caches.delete(k); }));
        }
      } catch (e) { /* seguimos igual */ }

      title.textContent = '¡Listo!';
      title.classList.add('ok');
      status.textContent = 'Abriendo la app limpia…';
      document.getElementById('spin').style.display = 'none';

      setTimeout(function () {
        location.replace('/?fresh=' + Date.now());
      }, 1300);
    })();
  </script>
</body>
</html>
